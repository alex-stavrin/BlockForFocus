<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlockForFocus</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="app-container">
    <header style="position: relative;">
      <div style="display: flex; justify-content: space-between; align-items: flex-start;">
        <h1>BlockForFocus</h1>
        <button id="popout-btn" class="icon-btn"
          style="width: 32px; height: 32px; font-size: 16px; background: transparent; padding: 0;"
          title="Pop Out Window">⏏</button>
      </div>
      <nav>
        <button id="nav-timer" class="nav-btn active">Timer</button>
        <button id="nav-blocklist" class="nav-btn">Blocklist</button>
        <button id="nav-history" class="nav-btn">History</button>
        <button id="nav-stats" class="nav-btn">Stats</button>
        <button id="nav-manage" class="nav-btn">Manage</button>
      </nav>
    </header>

    <main>
      <!-- Timer View -->
      <section id="view-timer" class="view active">
        <div id="setup-state">
          <h2>Ready to focus?</h2>
          <div class="input-group">
            <div class="time-input">
              <input type="number" id="duration-min" value="25" min="0" max="180">
              <label>Minutes</label>
            </div>
            <div class="time-separator">:</div>
            <div class="time-input">
              <input type="number" id="duration-sec" value="00" min="0" max="59">
              <label>Seconds</label>
            </div>
          </div>
          <button id="start-btn" class="primary-btn">Start Session</button>
        </div>

        <div id="active-state" class="hidden">
          <h2 id="active-title">Focusing...</h2>
          <div class="countdown" id="countdown-display">25:00</div>
          <div style="display: flex; gap: 8px; justify-content: center; width: 100%; margin-bottom: 24px;">
            <button id="pause-btn" class="primary-btn" style="flex: 1; min-width: 0; padding: 12px 0;">Pause</button>
            <button id="resume-btn" class="primary-btn hidden"
              style="flex: 1; min-width: 0; padding: 12px 0;">Resume</button>
            <button id="cancel-btn" class="secondary-btn"
              style="flex: 1; min-width: 0; padding: 12px 0;">Cancel</button>
          </div>
        </div>

        <div id="finished-state" class="hidden" style="text-align: center; margin-top: 32px;">
          <h2 style="font-size: 28px; margin-bottom: 8px;">Time's Up!</h2>
          <p class="subtitle" style="margin-bottom: 32px;">Your session is complete.</p>
          <button id="stop-alarm-btn" class="primary-btn">Stop Alarm</button>
        </div>
      </section>

      <!-- Blocklist View -->
      <section id="view-blocklist" class="view hidden">
        <h2>Blocked Sites</h2>
        <p class="subtitle">These sites are blocked during active sessions.</p>
        <div class="add-site">
          <input type="text" id="new-site-input" placeholder="e.g. reddit.com">
          <button id="add-site-btn" class="icon-btn">+</button>
        </div>
        <ul id="blocklist-items">
          <!-- Populated by JS -->
        </ul>
      </section>

      <!-- History View -->
      <section id="view-history" class="view hidden">
        <div class="history-header">
          <h2>Recent Sessions</h2>
          <button id="clear-history-btn" class="text-danger-btn">Clear</button>
        </div>
        <ul id="history-items">
          <!-- Populated by JS -->
        </ul>
      </section>

      <!-- Manage Time View -->
      <section id="view-manage" class="view hidden">
        <div class="history-header">
          <h2>Manage Time</h2>
        </div>
        <p class="subtitle">Manually add or remove focus time for today.</p>
        <div class="input-group">
          <div class="time-input">
            <input type="number" id="manage-time-min" value="15" min="0" max="1440" style="width: 60px;">
            <label>Minutes</label>
          </div>
          <div class="time-separator">:</div>
          <div class="time-input">
            <input type="number" id="manage-time-sec" value="0" min="0" max="59" style="width: 60px;">
            <label>Seconds</label>
          </div>
        </div>
        <div style="display: flex; gap: 8px;">
          <button id="add-time-submit-btn" class="primary-btn">Add</button>
          <button id="remove-time-submit-btn" class="secondary-btn">Remove</button>
        </div>
      </section>

      <!-- Stats View -->
      <section id="view-stats" class="view hidden">
        <div class="history-header">
          <h2>Daily Summary</h2>
          <div style="display: flex; align-items: center; gap: 8px; font-size: 13px;">
            <span>Last</span>
            <input type="number" id="stats-days-input" value="7" min="1" max="30"
              style="width: 40px; background: var(--surface-color); border: 1px solid var(--surface-hover); color: var(--text-main); border-radius: 4px; padding: 4px; text-align: center; outline: none;">
            <span>days</span>
          </div>
        </div>
        <ul id="stats-items">
          <!-- Populated by JS -->
        </ul>
      </section>
    </main>
  </div>
  <div id="toast-container" class="toast-container"></div>
  <script src="popup.js"></script>
</body>

</html>
